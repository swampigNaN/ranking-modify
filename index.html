<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スコア編集</title>
    <style>
        /* --- 全体のスタイリング --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            padding: 30px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
        }
        h1 { font-size: 28px; margin-bottom: 30px; color: #2c3e50; border-left: 5px solid #3498db; padding-left: 15px; }
        h2 { font-size: 20px; margin-bottom: 20px; color: #34495e; }

        /* --- データ一覧（テーブル） --- */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 16px; }
        th, td { padding: 16px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #7f8c8d; font-weight: bold; }
        tr:hover { background-color: #f1f2f6; }

        /* --- 操作ボタン（色分けして分かりやすく） --- */
        .btn-action {
            padding: 8px 14px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold;
            cursor: pointer; transition: 0.2s; margin-right: 5px;
        }
        .btn-edit-name { background-color: #f39c12; color: white; }
        .btn-edit-name:hover { background-color: #d35400; }
        .btn-edit-score { background-color: #3498db; color: white; }
        .btn-edit-score:hover { background-color: #2980b9; }
        .btn-edit-faction { background-color: #9b59b6; color: white; }
        .btn-edit-faction:hover { background-color: #8e44ad; }
        .btn-delete { background-color: #e74c3c; color: white; }
        .btn-delete:hover { background-color: #c0392b; }

        .loading { font-size: 18px; color: #999; text-align: center; padding: 40px; }
    </style>
</head>
<body>

<div class="container">
    <h1>スコア データの閲覧・変更</h1>

    <h2>登録されているユーザー一覧（リアルタイム同期）</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ユーザー名</th>
                    <th>点数</th>
                    <th>陣営</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="data-table-body">
                <tr>
                    <td colspan="4" class="loading">データを読み込んでいます...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // Firebaseの接続設定
    const firebaseConfig = {
        apiKey: "AIzaSyA2lcY-0TXBKFN2VajwSuQha8TfBvJeQk8",
        authDomain: "ranking-73f77.firebaseapp.com",
        databaseURL: "https://ranking-73f77-default-rtdb.firebaseio.com",
        projectId: "ranking-73f77",
        storageBucket: "ranking-73f77.firebasestorage.app",
        messagingSenderId: "192093284893",
        appId: "1:192093284893:web:c18f7dbfdec693cce2f4f4",
        measurementId: "G-9W2L9K2SW3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const tableBody = document.getElementById('data-table-body');

    // scores配下のデータを監視してテーブルをリアルタイム描画
    const scoresRef = ref(db, 'scores');
    onValue(scoresRef, (snapshot) => {
        tableBody.innerHTML = '';
        
        if (!snapshot.exists()) {
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#999;">データがありません。</td></tr>';
            return;
        }

        // 各ユーザーの行を生成
        snapshot.forEach(childSnapshot => {
            const name = childSnapshot.key;
            const data = childSnapshot.val();
            const score = data.score ?? 0;
            const faction = data.faction === 'kinoko' ? 'きのこの山' : 'たけのこの里';

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight: bold; font-size: 18px;">${name}</td>
                <td style="font-size: 18px; color: #2c3e50;">${score} 点</td>
                <td>${faction}</td>
                <td>
                    <button class="btn-action btn-edit-name" data-name="${name}" data-score="${score}" data-faction="${data.faction}">名前を変更</button>
                    <button class="btn-action btn-edit-score" data-name="${name}" data-score="${score}">点数を変更</button>
                    <button class="btn-action btn-edit-faction" data-name="${name}" data-current="${data.faction}">陣営を切り替え</button>
                    <button class="btn-action btn-delete" data-name="${name}">🗑️ 削除</button>
                </td>
            `;
            tableBody.appendChild(tr);
        });
    });

    // 各種操作ボタンのクリックイベント処理
    tableBody.addEventListener('click', (e) => {
        const target = e.target;
        const name = target.getAttribute('data-name');
        if (!name) return;

        // 名前を変更する処理（新名を作成して旧名を削除する処理を同時に実行）
        if (target.classList.contains('btn-edit-name')) {
            const currentScore = Number(target.getAttribute('data-score'));
            const currentFaction = target.getAttribute('data-faction');
            const newName = prompt(`【${name}】さんの新しい名前を入力してください：`, name);
            
            if (newName !== null && newName.trim() !== "" && newName.trim() !== name) {
                const cleanedName = newName.trim();
                const updates = {};
                // 新しい名前の場所にデータをセットし、古い名前の場所をnull（削除）にする
                updates[`scores/${cleanedName}`] = { score: currentScore, faction: currentFaction };
                updates[`scores/${name}`] = null;
                
                update(ref(db), updates).catch(err => alert("名前変更エラー: " + err.message));
            }
        }

        // 点数を変更する処理
        if (target.classList.contains('btn-edit-score')) {
            const currentScore = target.getAttribute('data-score');
            const newScore = prompt(`【${name}】さんの新しい点数を入力してください：`, currentScore);
            
            if (newScore !== null && newScore.trim() !== "") {
                const num = Number(newScore);
                if (!isNaN(num)) {
                    update(ref(db, `scores/${name}`), { score: num });
                } else {
                    alert("有効な数値を入力してください。");
                }
            }
        }

        // 陣営を切り替える処理
        if (target.classList.contains('btn-edit-faction')) {
            const currentFaction = target.getAttribute('data-current');
            const nextFaction = currentFaction === 'kinoko' ? 'takenoko' : 'kinoko';
            update(ref(db, `scores/${name}`), { faction: nextFaction });
        }

        // データを削除する処理
        if (target.classList.contains('btn-delete')) {
            if (confirm(`本当に【${name}】さんのデータを削除しますか？`)) {
                remove(ref(db, `scores/${name}`));
            }
        }
    });
</script>
</body>
</html>
